<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div id="success-message" style="display: none;"></div>

    <form id="registerForm">
        <h2>Đăng Ký</h2>
        
        <div class="form-group">
            <label for="fullname">Họ và tên</label>
            <input type="text" id="fullname" placeholder="Nhập họ và tên">
            <span class="error-message" id="fullname-error"></span>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="name@domain.com">
            <span class="error-message" id="email-error"></span>
        </div>

        <div class="form-group">
            <label for="phone">Số điện thoại</label>
            <input type="text" id="phone" placeholder="Bắt đầu bằng số 0, gồm 10 số">
            <span class="error-message" id="phone-error"></span>
        </div>

        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" placeholder="Tối thiểu 8 ký tự, 1 hoa, 1 thường, 1 số">
            <span class="error-message" id="password-error"></span>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Xác nhận mật khẩu</label>
            <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
            <span class="error-message" id="confirmPassword-error"></span>
        </div>

        <div class="form-group radio-group">
            <label>Giới tính:</label>
            <input type="radio" name="gender" id="gender-male" value="Nam"> <label for="gender-male">Nam</label>
            <input type="radio" name="gender" id="gender-female" value="Nữ"> <label for="gender-female">Nữ</label>
            <span class="error-message" id="gender-error"></span>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="terms"> <label for="terms">Tôi đồng ý với các điều khoản</label>
            <span class="error-message" id="terms-error"></span>
        </div>

        <button type="submit">Đăng Ký</button>
    </form>
</div>

<script src="main.js"></script>
</body>
</html>
