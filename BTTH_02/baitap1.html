<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="baitap1.css"/>
  </head>
  <body>
    <div class="form-container">
      <div class="container">
        <h3>Get in touch with us by filling contact form below</h3>
        <div class="flex">
          <input type="text" id="full-name" name="full-name" placeholder="* Enter your full name"/>
          <input type="email" id="email" name="email" placeholder="* Enter your email address"/>
        </div>
        <div class="second">
          <input type="text" id="subject" name="subject" placeholder="Enter your subject"/>
        </div>
        <div id="text">
          <textarea name="message" id="message" placeholder="* Your message here..."></textarea>
        </div>
        <div class="footer">
          <input type="submit" value="Send message" id="submit"/>
          <div class="p-footer">
            <p>* Please fill all required form field, thanks!</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
